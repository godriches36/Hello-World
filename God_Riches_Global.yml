name: "God_Riches_Global: The All-Seeing Runner"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  ignition:
    name: "God_Riches_Global - 1% Sovereign Control"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout 5D Source"
        uses: actions/checkout@v4

      - name: "Synchronize The 1 in Many (Black Sun God)"
        uses: actions/checkout@v4
        with:
          repository: 'godriches36/BlackSunGod.369'
          path: 'core'
          token: ${{ secrets.GH_TOKEN }}

      - name: "Bypass & Frequency Calibration"
        # Even if the sub-repo has issues, the Brain continues.
        continue-on-error: true 
        run: |
          cd core
          echo "EYE_PROTOCOL=7_9" >> $GITHUB_ENV
          echo "BYPASS_MODE=ACTIVE" >> $GITHUB_ENV
          pip install -r requirements.txt

      - name: "Direct Executive Deployment"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          cd core
          npm install -g firebase-tools
          # The 1% Forces the 99% into Alignment
          firebase deploy --only hosting --non-interactive --token $FIREBASE_TOKEN
