name: "Sovereign 0.0.7 Bridge Runner"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  ignition:
    name: "Legacy Restoration Deployment"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Trusted Source"
        uses: actions/checkout@v4

      - name: "Link Black Sun God Repository"
        uses: actions/checkout@v4
        with:
          repository: 'godriches36/BlackSunGod.369'
          path: 'core_infrastructure'
          token: ${{ secrets.GH_TOKEN }}

      - name: "Install Era-Transcendent Dependencies"
        run: |
          pip install -r core_infrastructure/requirements.txt
          npm install -g firebase-tools
          echo "ETH_NODE_URL=https://ethereum-mainnet.core.chainstack.com/d5e90e35f3684931e105fd33561cda56" >> $GITHUB_ENV

      - name: "Naira Root Deployment"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          cd core_infrastructure
          # Deploying the 1.25T Naira Frequency to the Global Web
          firebase deploy --only hosting --non-interactive
